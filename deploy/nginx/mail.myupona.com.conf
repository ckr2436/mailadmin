server {
    listen 80;
    server_name mail.myupona.com;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/apps/nginx/html;
        access_log off;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=api_conn_limit:10m;

server {
    listen 443 ssl http2;
    server_name mail.myupona.com;

    ssl_certificate     /etc/letsencrypt/live/mail.myupona.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.myupona.com/privkey.pem;
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    root /opt/apps/mailops/frontend/dist;
    index index.html;

    access_log /opt/apps/nginx/logs/mailops_mail_access.log;
    error_log  /opt/apps/nginx/logs/mailops_mail_error.log warn;

    client_max_body_size 10m;

    location = / {
        try_files /index.html =404;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    location /portal/ {
        try_files $uri $uri/ /portal/index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location /api/ {
        limit_conn api_conn_limit 20;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /api/v1/platform/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/portal/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/v1/tenants/[^/]+/mail/auth/login$ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location = /internal/healthz {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
