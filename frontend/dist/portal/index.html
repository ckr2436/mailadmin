<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MailOps Portal</title>
  <link rel="stylesheet" href="/assets/app.css"/>
</head>
<body>
  <div class="login-shell">
    <div class="login-card card">
      <div class="brand">Tenant Mail Portal</div>
      <div class="muted" style="margin-bottom:18px">mail.myupona.com · 邮箱用户中心</div>

      <div id="portalLoginBox">
        <div class="form-row">
          <div><select id="portalWorkspace"></select></div>
          <div><input id="portalEmail" placeholder="user@domain.com"></div>
          <div><input id="portalPassword" type="password" placeholder="password"></div>
          <div><button id="portalBtnLogin">登录</button></div>
        </div>
        <div class="smalltext">会校验邮箱所属域名是否在所选 workspace 下。</div>
        <div id="portalLoginMsg" class="hidden"></div>
      </div>

      <div id="portalApp" class="hidden">
        <div class="toolbar" style="margin-bottom:12px">
          <span id="portalSessionBadge" class="badge"></span>
          <div class="grow"></div>
          <button id="portalBtnReload" class="secondary small">刷新</button>
          <button id="portalBtnLogout" class="ghost small">退出</button>
        </div>

        <div id="portalProfileCard" class="card"></div>

        <hr/>
        <div class="card webmail-card">
          <h3>Webmail</h3>
          <div class="smalltext" style="margin-bottom:10px">首次进入请输入邮箱密码，用于连接 IMAP/SMTP。仅保存在当前页面内存中。</div>
          <div class="form-row">
            <div class="span-4"><input id="portalMailPassword" type="password" placeholder="邮箱密码"></div>
            <div class="span-2"><button id="portalBtnMailConnect" class="secondary">连接邮箱</button></div>
            <div class="span-2"><button id="portalBtnInbox" class="ghost">刷新收件箱</button></div>
          </div>
          <div id="portalMailMsg" class="hidden" style="margin-top:10px"></div>

          <div class="grid" style="margin-top:12px">
            <div class="col-6">
              <div class="card webmail-pane">
                <div class="toolbar" style="margin-bottom:8px">
                  <b>收件箱</b>
                  <div class="grow"></div>
                  <span class="smalltext">最近 20 封</span>
                </div>
                <div id="portalInboxList" class="mail-list"></div>
              </div>
            </div>
            <div class="col-6">
              <div class="card webmail-pane">
                <b>邮件正文</b>
                <div id="portalMailViewer" class="mail-viewer muted" style="margin-top:8px">请选择左侧邮件</div>
              </div>
            </div>
          </div>

          <div class="card webmail-pane" style="margin-top:12px">
            <h3>写邮件</h3>
            <div class="form-row">
              <div><input id="portalComposeTo" placeholder="收件人，多个用逗号分隔"></div>
              <div><input id="portalComposeSubject" placeholder="主题"></div>
              <div><textarea id="portalComposeBody" placeholder="邮件正文"></textarea></div>
              <div><button id="portalBtnSendMail">发送邮件</button></div>
            </div>
            <div id="portalComposeMsg" class="hidden"></div>
          </div>
        </div>

        <hr/>
        <div class="grid">
          <div class="col-6">
            <div class="card">
              <h3>Aliases</h3>
              <div id="portalAliases" class="list"></div>
            </div>
          </div>
          <div class="col-6">
            <div class="card">
              <h3>修改密码</h3>
              <div class="form-row">
                <div><input id="portalCurrentPassword" type="password" placeholder="当前密码"></div>
                <div><input id="portalNewPassword" type="password" placeholder="新密码"></div>
                <div><button id="portalBtnPassword">更新密码</button></div>
              </div>
              <div id="portalPwdMsg" class="hidden"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/assets/portal.js"></script>
</body>
</html>
